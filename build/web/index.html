<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
<title>Hizzz Snake</title>
<link rel="icon" type="image/png" href="favicon.png"/>
<style>
  *{margin:0;padding:0;box-sizing:border-box;}
    body{background:#181c24;display:flex;flex-direction:column;align-items:center;
      justify-content:center;height:100dvh;overflow:hidden;font-family:Consolas,monospace;
      touch-action:none;overscroll-behavior:none;}
  body::before{content:'';position:fixed;inset:0;
    background-image:linear-gradient(rgba(60,210,60,0.04) 1px,transparent 1px),
    linear-gradient(90deg,rgba(60,210,60,0.04) 1px,transparent 1px);
    background-size:30px 30px;animation:gridMove 8s linear infinite;pointer-events:none;}
  @keyframes gridMove{from{background-position:0 0;}to{background-position:30px 30px;}}

  #landing{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;
    justify-content:center;z-index:100;background:#181c24;transition:opacity 0.5s;padding:20px;}
  #landing.hidden{opacity:0;pointer-events:none;}
  .logo{font-size:clamp(36px,8vw,72px);font-weight:bold;color:#3cd23c;letter-spacing:6px;
    text-shadow:0 0 30px rgba(60,210,60,0.6);margin-bottom:6px;
    animation:pulse 2.5s ease-in-out infinite;}
  @keyframes pulse{0%,100%{text-shadow:0 0 30px rgba(60,210,60,0.4);}
    50%{text-shadow:0 0 60px rgba(60,210,60,1),0 0 100px rgba(60,210,60,0.5);}}
  .tagline{color:#4a6a4a;font-size:clamp(10px,2vw,13px);letter-spacing:5px;
    text-transform:uppercase;margin-bottom:36px;}
  .snake-row{display:flex;align-items:center;gap:5px;margin-bottom:36px;
    animation:float 2s ease-in-out infinite alternate;}
  @keyframes float{from{transform:translateY(-5px);}to{transform:translateY(5px);}}
  .seg{width:22px;height:22px;border-radius:5px;background:#2ea02e;}
  .seg.head{background:#3cd23c;border-radius:8px;box-shadow:0 0 12px rgba(60,210,60,0.6);}
  .seg.tail{clip-path:polygon(0 25%,75% 10%,100% 50%,75% 90%,0 75%);border-radius:0;background:#1a801a;}
  .diff-row{display:flex;gap:12px;margin-bottom:28px;flex-wrap:wrap;justify-content:center;}
  .diff-btn{padding:12px 26px;border-radius:30px;font-size:14px;font-weight:bold;
    letter-spacing:2px;border:2px solid;cursor:pointer;background:transparent;
    font-family:Consolas,monospace;transition:all 0.2s;}
  .diff-btn.easy{color:#50c850;border-color:#50c850;}
  .diff-btn.medium{color:#ddb830;border-color:#ddb830;}
  .diff-btn.hard{color:#dc3c3c;border-color:#dc3c3c;}
  .diff-btn.selected{filter:brightness(1.3);transform:scale(1.08);
    box-shadow:0 0 16px currentColor;}
  #play-btn{padding:16px 58px;background:transparent;border:2px solid #3cd23c;
    color:#3cd23c;font-family:Consolas,monospace;font-size:18px;font-weight:bold;
    letter-spacing:5px;cursor:pointer;border-radius:8px;transition:all 0.2s;
    animation:borderPulse 2s ease-in-out infinite;margin-bottom:20px;}
  @keyframes borderPulse{0%,100%{box-shadow:0 0 12px rgba(60,210,60,0.3);}
    50%{box-shadow:0 0 28px rgba(60,210,60,0.8);}}
  #play-btn:hover{background:rgba(60,210,60,0.1);transform:scale(1.04);}
  .controls-hint{color:#2a3a4a;font-size:11px;letter-spacing:2px;
    text-align:center;line-height:2.2;}
  .footer{position:fixed;bottom:14px;width:100%;text-align:center;
    color:#2a3540;font-size:11px;letter-spacing:2px;}
  .footer span{color:#3a5a3a;}

  #gameCanvas{display:block;position:fixed;inset:0;width:100vw;height:100dvh;
    opacity:0;transition:opacity 0.5s;touch-action:none;}
  #gameCanvas.visible{opacity:1;}

  /* HUD */
  #hud{position:fixed;top:10px;left:10px;z-index:50;opacity:0;transition:opacity 0.5s;}
  #hud.visible{opacity:1;}
  #badge{display:inline-block;padding:4px 14px;border-radius:6px;
    font-size:12px;font-weight:bold;letter-spacing:2px;color:#fff;margin-right:10px;}
  #scoreText{color:#bec3d2;font-size:16px;font-weight:bold;letter-spacing:1px;}
  #bonusText{margin-top:6px;color:#94d89b;font-size:13px;font-weight:bold;letter-spacing:1px;}

  #gameButtons{position:fixed;top:calc(env(safe-area-inset-top,0px) + 10px);right:10px;
    z-index:70;display:flex;opacity:0;pointer-events:none;
    transition:opacity 0.2s;}
  #gameButtons.visible{opacity:1;pointer-events:auto;}
  #pauseBtn{width:48px;height:48px;padding:0;border-radius:50%;border:2px solid #6f86d8;
    background:rgba(45,60,102,0.86);cursor:pointer;position:relative;}
  #pauseBtn::before,#pauseBtn::after{content:'';position:absolute;top:13px;width:6px;height:18px;
    border-radius:2px;background:#fff;}
  #pauseBtn::before{left:16px;}
  #pauseBtn::after{right:16px;}
  #pauseBtn.paused::before{left:18px;top:13px;width:0;height:0;background:transparent;
    border-top:10px solid transparent;border-bottom:10px solid transparent;border-left:14px solid #fff;border-radius:0;}
  #pauseBtn.paused::after{display:none;}
  #pauseBtn:active{transform:scale(0.98);}

  /* Game over overlay */
  #goScreen{position:fixed;inset:0;background:rgba(15,15,25,0.95);
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    z-index:200;opacity:0;pointer-events:none;transition:opacity 0.4s;}
  #goScreen.visible{opacity:1;pointer-events:all;}
  .go-title{font-size:clamp(32px,7vw,64px);font-weight:bold;color:#dc3c3c;
    letter-spacing:4px;margin-bottom:16px;}
  .go-score{font-size:clamp(14px,3vw,22px);color:#c8c8d2;margin-bottom:8px;}
  .go-diff{font-size:13px;letter-spacing:3px;margin-bottom:32px;}
  .go-btn{padding:14px 44px;margin:8px;border-radius:8px;border:2px solid;
    background:transparent;font-family:Consolas,monospace;font-size:15px;
    font-weight:bold;letter-spacing:3px;cursor:pointer;transition:all 0.2s;}
  .go-btn.restart{color:#3cd23c;border-color:#3cd23c;}
  .go-btn.menu{color:#5a7acc;border-color:#5a7acc;}
  .go-btn:hover{transform:scale(1.05);filter:brightness(1.2);}

  #pauseOverlay{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;
    background:rgba(12,16,22,0.55);backdrop-filter:blur(1px);
    z-index:180;opacity:0;pointer-events:none;transition:opacity 0.2s;text-align:center;padding:24px;}
  #pauseOverlay.visible{opacity:1;pointer-events:all;}
  #pauseCard{min-width:min(320px,92vw);background:rgba(24,30,42,0.92);border:1px solid rgba(111,134,216,0.45);
    border-radius:16px;padding:22px 18px 16px;box-shadow:0 14px 36px rgba(0,0,0,0.42);}
  #pauseCard h2{color:#d6e8d6;font-size:clamp(24px,4vw,38px);font-weight:bold;letter-spacing:4px;}
  #pauseCard small{display:block;color:#9ab09a;font-size:clamp(12px,2vw,15px);letter-spacing:2px;margin-top:8px;font-weight:normal;}
  #pauseActions{display:flex;flex-direction:column;gap:10px;margin-top:20px;}
  .pause-action{padding:12px 14px;border-radius:10px;border:2px solid;background:transparent;color:#fff;
    font-family:Consolas,monospace;font-size:13px;font-weight:bold;letter-spacing:2px;cursor:pointer;}
  .pause-action.resume{border-color:#4fb567;background:rgba(32,86,44,0.75);}
  .pause-action.menu{border-color:#6f86d8;background:rgba(45,60,102,0.78);}
  .pause-action:active{transform:scale(0.99);}

  @media (max-width:700px){
    .controls-hint{font-size:12px;line-height:2;}
    #badge{padding:6px 16px;font-size:13px;}
    #scoreText{font-size:17px;}
    #bonusText{font-size:14px;}
    #gameButtons{right:8px;top:calc(env(safe-area-inset-top,0px) + 8px);}
    #pauseBtn{width:44px;height:44px;}
    #pauseBtn::before,#pauseBtn::after{top:12px;height:16px;}
    #pauseBtn::before{left:15px;}
    #pauseBtn::after{right:15px;}
    #pauseBtn.paused::before{left:16px;top:11px;border-top:9px solid transparent;border-bottom:9px solid transparent;border-left:13px solid #fff;}
  }
</style>
</head>
<body>

<!-- LANDING PAGE -->
<div id="landing">
  <div class="logo">HIZZZ</div>
  <div class="tagline">Snake &bull; Eat &bull; Survive &bull; Repeat</div>
  <div class="snake-row">
    <div class="seg head"></div>
    <div class="seg"></div><div class="seg"></div>
    <div class="seg"></div><div class="seg"></div>
    <div class="seg tail"></div>
    <span style="font-size:22px;margin-left:8px;">&#127822;</span>
  </div>
  <div class="diff-row">
    <button class="diff-btn easy"   onclick="selectDiff('easy')">EASY</button>
    <button class="diff-btn medium selected" onclick="selectDiff('medium')">MEDIUM</button>
    <button class="diff-btn hard"   onclick="selectDiff('hard')">HARD</button>
  </div>
  <button id="play-btn" onclick="startGame()">PLAY</button>
  <div class="controls-hint">
    Arrow Keys / WASD to move &nbsp;|&nbsp; Swipe on mobile<br>
    Use PAUSE button or P key &nbsp;|&nbsp; Avoid rocks and yourself
  </div>
  <div class="footer">hizzz &nbsp;&mdash;&nbsp; made by <span>Ayan Malaviya</span></div>
</div>

<!-- GAME CANVAS -->
<canvas id="gameCanvas"></canvas>

<!-- HUD -->
<div id="hud">
  <span id="badge">MEDIUM</span>
  <span id="scoreText">Score: 0 | Length: 1</span>
  <div id="bonusText">Bonus Moves Left: 0 | Bonus Points: +0</div>
</div>

<div id="gameButtons">
  <button id="pauseBtn" type="button" aria-label="Pause"></button>
</div>

<div id="pauseOverlay">
  <div id="pauseCard">
    <h2>PAUSED</h2>
    <small>Tap Resume or press P to continue</small>
    <div id="pauseActions">
      <button id="resumeBtn" class="pause-action resume" type="button">RESUME</button>
      <button id="pauseMenuBtn" class="pause-action menu" type="button">BACK TO MENU</button>
    </div>
  </div>
</div>

<!-- GAME OVER -->
<div id="goScreen">
  <div class="go-title">GAME OVER</div>
  <div class="go-score" id="goScore"></div>
  <div class="go-score" id="goBonus"></div>
  <div class="go-diff"  id="goDiff"></div>
  <button class="go-btn restart" onclick="restartGame()">R &mdash; RESTART</button>
  <button class="go-btn menu"    onclick="goMenu()">M &mdash; MENU</button>
</div>

<script>
// ================================================
// DOUBLY LINKED LIST (same logic as Python version)
// ================================================
class Node {
  constructor(x, y) {
    this.x = x; this.y = y;
    this.next = null; this.prev = null;
  }
}

class SnakeLinkedList {
  constructor(x, y) {
    this.head = new Node(x, y);
    this.tail = this.head;
    this.length = 1;
  }

  move(nx, ny, ateApple = false) {
    const newHead = new Node(nx, ny);
    newHead.next  = this.head;
    this.head.prev = newHead;
    this.head      = newHead;
    if (!ateApple) {
      // Sever tail -- JS garbage collector handles the rest
      this.tail      = this.tail.prev;
      this.tail.next = null;
    } else {
      this.length++;
    }
  }

  checkBodyCollision() {
    let curr = this.head.next;
    while (curr) {
      if (curr.x === this.head.x && curr.y === this.head.y) return true;
      curr = curr.next;
    }
    return false;
  }

  getPositions() {
    const pos = []; let curr = this.head;
    while (curr) { pos.push([curr.x, curr.y]); curr = curr.next; }
    return pos;
  }
}

// ================================================
// DIFFICULTY CONFIG
// ================================================
const DIFF = {
  easy:   { speed:6,  stones:4,  mult:1, color:'#50c850', label:'EASY'   },
  medium: { speed:10, stones:12, mult:2, color:'#ddb830', label:'MEDIUM' },
  hard:   { speed:16, stones:22, mult:3, color:'#dc3c3c', label:'HARD'   },
};

// ================================================
// GAME STATE
// ================================================
const canvas  = document.getElementById('gameCanvas');
const ctx     = canvas.getContext('2d');
const pauseBtn = document.getElementById('pauseBtn');
const resumeBtn = document.getElementById('resumeBtn');
const pauseMenuBtn = document.getElementById('pauseMenuBtn');
const gameButtons = document.getElementById('gameButtons');
let CELL, COLS, ROWS, W, H;
let snake, dx, dy, ndx, ndy, progress, score;
let appleX, appleY, stones;
let currentDiff = 'medium';
let gameRunning = false;
let isPaused = false;
let lastTime    = 0;
let swipeStart  = null;
let activeSwipeId = null;
let swipeThreshold = 24;
let moveCount = 0;
let lastAppleMove = null;
let bonusPointsTotal = 0;
let bonusMovesLeft = 0;
const appleImg = new Image();
let appleImgReady = false;
appleImg.onload = () => { appleImgReady = true; };
appleImg.src = 'apple.png';

// ================================================
// RESIZE HANDLER -- fully responsive
// ================================================
function resize() {
  W = canvas.width  = window.innerWidth;
  H = canvas.height = window.innerHeight;
  CELL = Math.max(Math.min(Math.floor(W/28), Math.floor(H/22)), 18);
  COLS = Math.floor(W / CELL);
  ROWS = Math.floor(H / CELL);
  swipeThreshold = Math.max(16, CELL * 0.9);
}
window.addEventListener('resize', () => { resize(); });
resize();

// ================================================
// SPRITE DRAWERS (programmatic -- no images needed)
// ================================================
function drawHead(x, y, dirX, dirY) {
  const eyeOuter = Math.max(2, Math.round(CELL * 0.16));
  const eyeInner = Math.max(1, Math.round(CELL * 0.06));
  const eyeInset = Math.round(CELL * 0.22);
  const snoutPad = Math.max(2, Math.round(CELL * 0.09));
  const tongueLen = Math.max(4, Math.round(CELL * 0.16));
  const tongueOffset = Math.max(3, Math.round(CELL * 0.13));
  const tongueWidth = Math.max(2, Math.round(CELL * 0.07));
  const angle = Math.atan2(dirY, dirX);
  ctx.save();
  ctx.translate(x + CELL/2, y + CELL/2);
  ctx.rotate(angle);
  // Body
  roundRect(-CELL/2, -CELL/2, CELL, CELL, CELL*0.36, '#3cd23c');
  // Snout
  roundRect(0, -CELL/2 + snoutPad, CELL/2, CELL - snoutPad * 2, CELL*0.25, '#1ea01e');
  // Eyes
  ctx.fillStyle = '#f0f0f0';
  ctx.beginPath(); ctx.arc(CELL/2-eyeInset,  -CELL/2+eyeInset,  eyeOuter, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(CELL/2-eyeInset,   CELL/2-eyeInset,  eyeOuter, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#0a0a0a';
  ctx.beginPath(); ctx.arc(CELL/2-eyeInset+eyeInner,  -CELL/2+eyeInset,  eyeInner, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(CELL/2-eyeInset+eyeInner,   CELL/2-eyeInset,  eyeInner, 0, Math.PI*2); ctx.fill();
  // Tongue
  ctx.strokeStyle='#dc1e1e'; ctx.lineWidth=tongueWidth;
  ctx.beginPath(); ctx.moveTo(CELL/2, 0);
  ctx.lineTo(CELL/2+tongueLen, -tongueOffset); ctx.moveTo(CELL/2, 0);
  ctx.lineTo(CELL/2+tongueLen,  tongueOffset); ctx.stroke();
  ctx.strokeStyle='rgba(15,30,15,0.35)';
  ctx.lineWidth=Math.max(1, Math.round(CELL*0.05));
  ctx.strokeRect(-CELL/2+0.5, -CELL/2+0.5, CELL-1, CELL-1);
  ctx.restore();
}

function drawBody(x, y) {
  const border = Math.max(1, Math.round(CELL * 0.04));
  const inner  = Math.max(3, Math.round(CELL * 0.15));
  const scaleW = Math.max(6, Math.round(CELL * 0.38));
  const scaleH = Math.max(3, Math.round(CELL * 0.22));
  roundRect(x+border, y+border, CELL-border*2, CELL-border*2, CELL*0.2,  '#32b932');
  roundRect(x+inner, y+inner, CELL-inner*2, CELL-inner*2, CELL*0.15, '#1e8c1e');
  ctx.fillStyle='#46d246';
  ctx.beginPath(); ctx.ellipse(x + Math.round(CELL * 0.28), y + Math.round(CELL * 0.26), scaleW/2, scaleH/2, 0, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(x + Math.round(CELL * 0.28), y + CELL - Math.round(CELL * 0.26), scaleW/2, scaleH/2, 0, 0, Math.PI*2); ctx.fill();
  ctx.strokeStyle='rgba(15,30,15,0.28)';
  ctx.lineWidth=Math.max(1, Math.round(CELL*0.05));
  ctx.strokeRect(x+0.5, y+0.5, CELL-1, CELL-1);
}

function drawTail(x, y, dirX, dirY) {
  const tip = Math.max(5, Math.round(CELL * 0.24));
  const side = Math.max(3, Math.round(CELL * 0.09));
  const angle = Math.atan2(dirY, dirX);
  ctx.save();
  ctx.translate(x + CELL/2, y + CELL/2);
  ctx.rotate(angle);
  ctx.fillStyle = '#3cd23c';
  ctx.beginPath();
  ctx.moveTo(-CELL/2, -CELL/2+tip);
  ctx.lineTo(CELL/2-tip, -side);
  ctx.lineTo(CELL/2, 0);
  ctx.lineTo(CELL/2-tip, side);
  ctx.lineTo(-CELL/2, CELL/2-tip);
  ctx.closePath(); ctx.fill();
  ctx.fillStyle = '#1ea01e';
  ctx.beginPath();
  ctx.moveTo(-CELL/2+Math.max(2, Math.round(CELL*0.09)), -CELL/2+tip+Math.max(2, Math.round(CELL*0.09)));
  ctx.lineTo(CELL/2-tip-Math.max(1, Math.round(CELL*0.06)), -Math.max(1, Math.round(CELL*0.06)));
  ctx.lineTo(CELL/2-Math.max(3, Math.round(CELL*0.15)), 0);
  ctx.lineTo(CELL/2-tip-Math.max(1, Math.round(CELL*0.06)), Math.max(1, Math.round(CELL*0.06)));
  ctx.lineTo(-CELL/2+Math.max(2, Math.round(CELL*0.09)), CELL/2-tip-Math.max(2, Math.round(CELL*0.09)));
  ctx.closePath(); ctx.fill();
  ctx.restore();
}

function drawStone(x, y) {
  const pts = [[5,0],[CELL-5,0],[CELL,5],[CELL,CELL-5],
               [CELL-5,CELL],[5,CELL],[0,CELL-5],[0,5]];
  ctx.fillStyle='#6e6e73';
  ctx.beginPath(); ctx.moveTo(x+pts[0][0], y+pts[0][1]);
  pts.forEach(p => ctx.lineTo(x+p[0], y+p[1]));
  ctx.closePath(); ctx.fill();
  ctx.fillStyle='rgba(255,255,255,0.15)';
  ctx.beginPath(); ctx.moveTo(x+6,y+2);
  ctx.lineTo(x+CELL-6,y+2); ctx.lineTo(x+CELL-4,y+9); ctx.lineTo(x+6,y+9);
  ctx.closePath(); ctx.fill();
}

function drawApple(x, y, pulse) {
  const sz  = CELL * (1 + pulse * 0.05);
  const off = (CELL - sz) / 2;
  const cx  = x + off + sz/2, cy = y + off + sz/2;
  if (appleImgReady) {
    ctx.drawImage(appleImg, x + off, y + off, sz, sz);
    return;
  }
  ctx.fillStyle='#d21e1e';
  ctx.beginPath(); ctx.arc(cx, cy+2, sz/2-3, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle='rgba(255,120,120,0.9)';
  ctx.beginPath(); ctx.arc(cx-sz*0.17, cy-sz*0.13, sz*0.17, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle='#64321e';
  ctx.fillRect(cx-1, y+off, 3, 7);
  ctx.fillStyle='#28be28';
  ctx.beginPath(); ctx.ellipse(cx+4, y+off+3, 6, 3, -0.4, 0, Math.PI*2); ctx.fill();
}

function roundRect(x, y, w, h, r, color) {
  ctx.fillStyle = color;
  ctx.beginPath();
  ctx.roundRect(x, y, w, h, r);
  ctx.fill();
}

// ================================================
// GRID BACKGROUND
// ================================================
function drawGrid() {
  ctx.fillStyle = '#282c34';
  ctx.fillRect(0, 0, W, H);
  ctx.fillStyle = 'rgba(60,210,60,0.06)';
  for (let gx = 0; gx < COLS; gx++)
    for (let gy = 0; gy < ROWS; gy++)
      ctx.fillRect(gx*CELL + CELL/2-1, gy*CELL + CELL/2-1, 2, 2);
}

// ================================================
// INTERPOLATION (smooth glide between cells)
// ================================================
function lerp(cx, cy, nx, ny, t) {
  let ddx = nx - cx, ddy = ny - cy;
  if (Math.abs(ddx) > COLS/2) ddx = 0;
  if (Math.abs(ddy) > ROWS/2) ddy = 0;
  const ts = t*t*(3-2*t); // ease-in-out
  return [cx*CELL + ddx*CELL*ts, cy*CELL + ddy*CELL*ts];
}

// ================================================
// GAME INIT
// ================================================
function initGame(diff) {
  const cfg = DIFF[diff];
  snake    = new SnakeLinkedList(Math.floor(COLS/2), Math.floor(ROWS/2));
  dx = dy  = 0;
  ndx = 1; ndy = 0;
  moveCount = 0;
  lastAppleMove = null;
  bonusPointsTotal = 0;
  bonusMovesLeft = 0;
  progress = 0; score = 0;
  appleX   = Math.floor(Math.random()*COLS);
  appleY   = Math.floor(Math.random()*ROWS);
  stones   = new Set();
  while (stones.size < cfg.stones) {
    const sx = Math.floor(Math.random()*COLS);
    const sy = Math.floor(Math.random()*ROWS);
    const key = sx+','+sy;
    if (key !== Math.floor(COLS/2)+','+Math.floor(ROWS/2) &&
        key !== appleX+','+appleY) stones.add(key);
  }
  // Update HUD badge color
  document.getElementById('badge').textContent = cfg.label;
  document.getElementById('badge').style.background = cfg.color;
  updateHUD();
  updateBonusUI();
}

function updateHUD() {
  document.getElementById('scoreText').textContent =
    'Score: ' + score + '  |  Length: ' + snake.length;
}

function updateBonusUI() {
  document.getElementById('bonusText').textContent =
    'Bonus Moves Left: ' + bonusMovesLeft + '  |  Bonus Points: +' + bonusPointsTotal;
}

function updatePauseButton() {
  pauseBtn.classList.toggle('paused', isPaused);
  pauseBtn.setAttribute('aria-label', isPaused ? 'Resume' : 'Pause');
}

// ================================================
// DIFFICULTY SELECTION
// ================================================
function selectDiff(d) {
  currentDiff = d;
  document.querySelectorAll('.diff-btn').forEach(b => b.classList.remove('selected'));
  document.querySelector('.diff-btn.'+d).classList.add('selected');
}

// ================================================
// START / RESTART / MENU
// ================================================
function startGame() {
  resize();
  initGame(currentDiff);
  document.getElementById('landing').classList.add('hidden');
  document.getElementById('gameCanvas').classList.add('visible');
  document.getElementById('hud').classList.add('visible');
  gameButtons.classList.add('visible');
  document.getElementById('pauseOverlay').classList.remove('visible');
  isPaused = false;
  updatePauseButton();
  gameRunning = true;
  lastTime    = performance.now();
  requestAnimationFrame(gameLoop);
}

function restartGame() {
  document.getElementById('goScreen').classList.remove('visible');
  initGame(currentDiff);
  gameButtons.classList.add('visible');
  document.getElementById('pauseOverlay').classList.remove('visible');
  isPaused = false;
  updatePauseButton();
  gameRunning = true;
  lastTime    = performance.now();
  requestAnimationFrame(gameLoop);
}

function goMenu() {
  document.getElementById('goScreen').classList.remove('visible');
  document.getElementById('gameCanvas').classList.remove('visible');
  document.getElementById('hud').classList.remove('visible');
  gameButtons.classList.remove('visible');
  document.getElementById('pauseOverlay').classList.remove('visible');
  document.getElementById('landing').classList.remove('hidden');
  isPaused = false;
  updatePauseButton();
  gameRunning = false;
}

function triggerGameOver() {
  gameRunning = false;
  isPaused = false;
  gameButtons.classList.remove('visible');
  updatePauseButton();
  document.getElementById('pauseOverlay').classList.remove('visible');
  const cfg = DIFF[currentDiff];
  document.getElementById('goScore').textContent =
    'Score: ' + score + '   |   Length: ' + snake.length;
  document.getElementById('goBonus').textContent =
    'Bonus Points: +' + bonusPointsTotal + '   |   Bonus Moves Left: ' + bonusMovesLeft;
  document.getElementById('goDiff').style.color = cfg.color;
  document.getElementById('goDiff').textContent = 'Difficulty: ' + cfg.label;
  document.getElementById('goScreen').classList.add('visible');
}

function togglePause(forceValue) {
  if (!gameRunning) return;
  isPaused = typeof forceValue === 'boolean' ? forceValue : !isPaused;
  updatePauseButton();
  document.getElementById('pauseOverlay').classList.toggle('visible', isPaused);
  if (!isPaused) {
    lastTime = performance.now();
  }
}

pauseBtn.addEventListener('click', () => {
  togglePause();
});

resumeBtn.addEventListener('click', () => {
  togglePause(false);
});

pauseMenuBtn.addEventListener('click', () => {
  goMenu();
});

// ================================================
// MAIN GAME LOOP
// ================================================
function gameLoop(timestamp) {
  if (!gameRunning) return;

  if (isPaused) {
    requestAnimationFrame(gameLoop);
    return;
  }

  const dt      = Math.min((timestamp - lastTime) / 1000, 0.05);
  lastTime      = timestamp;
  const SPEED   = DIFF[currentDiff].speed;
  progress     += dt * SPEED;

  // Predict next head for interpolation
  let nxHead = (snake.head.x + ndx + COLS) % COLS;
  let nyHead = (snake.head.y + ndy + ROWS) % ROWS;

  // LOGIC TICK
  if (progress >= 1.0) {
    progress -= 1.0;
    dx = ndx; dy = ndy;
    const newX = (snake.head.x + dx + COLS) % COLS;
    const newY = (snake.head.y + dy + ROWS) % ROWS;
    moveCount += 1;

    // Stone collision
    if (stones.has(newX+','+newY)) { triggerGameOver(); return; }

    // Apple
    let ateApple = (newX === appleX && newY === appleY);
    if (ateApple) {
      score += 10 * DIFF[currentDiff].mult;
      if (lastAppleMove !== null && (moveCount - lastAppleMove) < 3) {
        score += 1;
        bonusPointsTotal += 1;
      }
      lastAppleMove = moveCount;
      updateHUD();
      do {
        appleX = Math.floor(Math.random()*COLS);
        appleY = Math.floor(Math.random()*ROWS);
      } while (stones.has(appleX+','+appleY));
    }

    if (lastAppleMove === null) {
      bonusMovesLeft = 0;
    } else {
      bonusMovesLeft = Math.max(0, 2 - (moveCount - lastAppleMove));
    }
    updateBonusUI();

    // Move linked list
    snake.move(newX, newY, ateApple);
    if (!ateApple) updateHUD();

    // Self collision
    if (snake.checkBodyCollision()) { triggerGameOver(); return; }

    nxHead = (snake.head.x + dx + COLS) % COLS;
    nyHead = (snake.head.y + dy + ROWS) % ROWS;
  }

  // RENDER
  drawGrid();

  // Stones
  stones.forEach(k => {
    const [sx,sy] = k.split(',').map(Number);
    drawStone(sx*CELL, sy*CELL);
  });

  // Apple pulse
  const pulse = Math.sin(timestamp * 0.005);
  drawApple(appleX*CELL, appleY*CELL, pulse);

  // Snake -- traverse linked list
  const positions = snake.getPositions();
  const nextPos   = [[nxHead, nyHead], ...positions.slice(0,-1)];

  for (let i = 0; i < positions.length; i++) {
    const [cx,cy]   = positions[i];
    const [nxtX,nxtY] = nextPos[i];
    const [rx,ry]   = lerp(cx, cy, nxtX, nxtY, progress);

    if (i === 0) {
      const headDX = dx !== 0 || dy !== 0 ? dx : ndx;
      const headDY = dx !== 0 || dy !== 0 ? dy : ndy;
      drawHead(rx, ry, headDX, headDY);
    } else if (i === positions.length-1) {
      const [px,py] = positions[Math.max(0,i-1)];
      let tdx = px - cx;
      let tdy = py - cy;
      if (Math.abs(tdx) > COLS/2) tdx = -Math.sign(tdx);
      if (Math.abs(tdy) > ROWS/2) tdy = -Math.sign(tdy);
      tdx = Math.sign(tdx);
      tdy = Math.sign(tdy);
      if (tdx === 0 && tdy === 0) {
        tdx = dx !== 0 || dy !== 0 ? dx : ndx;
        tdy = dx !== 0 || dy !== 0 ? dy : ndy;
      }
      drawTail(rx, ry, tdx, tdy);
    } else {
      drawBody(rx, ry);
    }
  }

  requestAnimationFrame(gameLoop);
}

// ================================================
// INPUT -- Keyboard
// ================================================
document.addEventListener('keydown', e => {
  if (!gameRunning) {
    if (e.key==='Enter'||e.key===' ') startGame();
    return;
  }
  if (e.key==='p'||e.key==='P') { togglePause(); return; }
  if (isPaused) return;
  if ((e.key==='ArrowUp'   ||e.key==='w') && dy!==1)  { ndx=0;  ndy=-1; }
  if ((e.key==='ArrowDown' ||e.key==='s') && dy!==-1) { ndx=0;  ndy=1;  }
  if ((e.key==='ArrowLeft' ||e.key==='a') && dx!==1)  { ndx=-1; ndy=0;  }
  if ((e.key==='ArrowRight'||e.key==='d') && dx!==-1) { ndx=1;  ndy=0;  }
  if (e.key==='Escape') goMenu();
  if (e.key==='r'||e.key==='R') {
    if (!gameRunning) restartGame();
  }
});

// ================================================
// INPUT -- Swipe
// ================================================
function ignoreSwipeTarget(target) {
  return !!(target.closest('#goScreen') || target.closest('#landing') || target.closest('#gameButtons') || target.closest('#pauseOverlay'));
}

function applySwipeDelta(sdx, sdy) {
  if (Math.hypot(sdx, sdy) < swipeThreshold) return;
  if (Math.abs(sdx) > Math.abs(sdy)) {
    if (sdx > 0 && dx !== -1) { ndx = 1; ndy = 0; }
    else if (sdx < 0 && dx !== 1) { ndx = -1; ndy = 0; }
  } else {
    if (sdy > 0 && dy !== -1) { ndx = 0; ndy = 1; }
    else if (sdy < 0 && dy !== 1) { ndx = 0; ndy = -1; }
  }
}

document.addEventListener('pointerdown', e => {
  if (!gameRunning || e.button !== 0 || ignoreSwipeTarget(e.target)) return;

  if (isPaused) return;
  activeSwipeId = e.pointerId;
  swipeStart = [e.clientX, e.clientY];
});

document.addEventListener('pointermove', e => {
  if (!gameRunning || isPaused || !swipeStart || e.pointerId !== activeSwipeId) return;
  const sdx = e.clientX - swipeStart[0];
  const sdy = e.clientY - swipeStart[1];
  if (Math.hypot(sdx, sdy) >= swipeThreshold) {
    applySwipeDelta(sdx, sdy);
    swipeStart = [e.clientX, e.clientY];
  }
});

document.addEventListener('pointerup', e => {
  if (e.pointerId !== activeSwipeId || !swipeStart) return;
  if (gameRunning && !isPaused) {
    applySwipeDelta(e.clientX - swipeStart[0], e.clientY - swipeStart[1]);
  }
  activeSwipeId = null;
  swipeStart = null;
});

document.addEventListener('pointercancel', e => {
  if (e.pointerId !== activeSwipeId) return;
  activeSwipeId = null;
  swipeStart = null;
});

// Game over keyboard shortcuts
document.addEventListener('keydown', e => {
  if (document.getElementById('goScreen').classList.contains('visible')) {
    if (e.key==='r'||e.key==='R') restartGame();
    if (e.key==='m'||e.key==='M'||e.key==='Escape') goMenu();
  }
});
</script>
